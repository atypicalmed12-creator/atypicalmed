<div class="video-container" style="text-align: center; margin: 20px 0;">
  <video 
    controls 
    style="max-width: {{ include.max_width | default: '100%' }}; height: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">

    Il tuo browser non supporta il tag video.
  </video>
</div>
